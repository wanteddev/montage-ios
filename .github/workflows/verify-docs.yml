name: verify-docs

on:
  pull_request:
    branches:
      - develop
      - main
      - 'release/*'
    paths:
      - "**.swift"

jobs:
  verify:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install xcodes CLI
        run: |
          if ! command -v xcodes >/dev/null 2>&1; then
            brew install robotsandpencils/made/xcodes
          else
            echo "xcodes CLI already installed: $(xcodes --version)"
          fi

      - name: Run generate_docc.sh
        run: ./generate_docc.sh

      - name: Run docc_to_md.js
        run: node docc_to_md.js

      - name: Fail when documentation artifacts changed
        run: |
          if git diff --quiet; then
            echo "Documentation artifacts are up to date."
          else
            echo "ERROR: Documentation scripts produced changes."
            echo " - Run \`./generate_docc.sh && node docc_to_md.js\` locally and commit the results."
            echo " - ⚠️ This workflow is running on Xcode version `xcodes installed | grep Selected | cut -d ' ' -f1`."
            git status -sb
            git --no-pager diff
            exit 1
          fi

