name: Generate Document & PR

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  generate-document:
    runs-on: [self-hosted, utility]
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true

    env:
      GIT_USER_NAME: 'github-actions[bot]'
      GIT_USER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
      GH_TOKEN: ${{ github.token }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub CLI
        run: |
          brew install gh

      - name: Get milestone version
        id: get_version
        run: |
          PR_NUMBER=$(gh pr list --state merged --limit 1 --json number --jq '.[0].number')
          MILESTONE=$(gh pr view $PR_NUMBER --json milestone --jq '.milestone.title')
          VERSION="v${MILESTONE}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and checkout feature branch
        id: create_branch
        run: |
          git checkout develop
          git pull origin develop
          BRANCH_NAME="feature/documentation/${{ steps.get_version.outputs.version }}"
          if git show-ref --verify --quiet refs/heads/$BRANCH_NAME; then
            git checkout $BRANCH_NAME
            git reset --hard origin/$BRANCH_NAME
          else
            git checkout -b $BRANCH_NAME
          fi
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Run generate_docc.sh
        run: |
          if ! ./generate_docc.sh; then
            echo "Failed to generate docc documentation"
            exit 1
          fi

      - name: Run docc_to_md.js
        run: |
          if ! node docc_to_md.js; then
            echo "Failed to convert docc to markdown"
            exit 1
          fi

      - name: Commit and push markdown docs
        id: commit
        run: |
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "docs: convert docc to markdown [ci skip]"
            git push origin HEAD --force
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.changes == 'true'
        run: |
          PR_EXISTS=$(gh pr list --head feature/documentation/${{ steps.get_version.outputs.version }} --json number --jq 'length')
          if [ "$PR_EXISTS" -eq "0" ]; then
            gh pr create --base develop --head feature/documentation/${{ steps.get_version.outputs.version }} \
              --title "docs: docc to markdown for ${{ steps.get_version.outputs.version }}" \
              --body "Montage ${{ steps.get_version.outputs.version }} 최신 문서 반영 PR입니다." \
              --label "documentation"
          else
            echo "PR already exists for branch feature/documentation/${{ steps.get_version.outputs.version }}"
          fi
