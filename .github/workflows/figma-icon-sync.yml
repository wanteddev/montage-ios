name: Figma Icon Sync

on:
  workflow_dispatch:
    inputs:
      jira_issue:
        description: 'Jira 이슈 번호 (예: PI-77691)'
        required: false
        type: string

permissions:
  packages: write
  contents: write
  pull-requests: write

jobs:
  sync:
    uses: wanteddev/wds/.github/workflows/figma-icon-sync.yml@main
    with:
      output_dir: output
    secrets: inherit

  parse:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: output
          key: ${{ needs.sync.outputs.figma-output-cache-key }}

      - name: Node.js install
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node icon_sync.js

      - run: git config user.name "github-actions[bot]"
      - run: git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Branch And Commit
        id: commit
        run: |
          # 브랜치명 생성 (Jira 이슈 번호가 있으면 사용, 없으면 run_id 사용)
          if [ -n "${{ github.event.inputs.jira_issue }}" ]; then
            # Jira 이슈 번호에서 공백과 특수문자를 하이픈으로 변환하여 안전한 브랜치명 생성
            SANITIZED_JIRA_ISSUE=$(echo "${{ github.event.inputs.jira_issue }}" | tr -c 'A-Za-z0-9._-/' '-' | tr '[:space:]' '-')
            BRANCH_NAME="feature/$SANITIZED_JIRA_ISSUE"
          else
            BRANCH_NAME="feature/code-connect/${{ github.run_id }}"
          fi
          
          git checkout -B $BRANCH_NAME
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: add icons synced from figma" --no-verify
            git push origin $BRANCH_NAME
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Create New PR
        if: steps.commit.outputs.changes == 'true'
        id: create_pr
        run: |
          # PR body 생성 (Jira 이슈 링크 포함)
          PR_BODY="add icons synced from figma"
          if [ -n "${{ github.event.inputs.jira_issue }}" ]; then
            PR_BODY="https://wantedlab.atlassian.net/browse/${{ github.event.inputs.jira_issue }}"
          fi
          
          # 현재 브랜치에 연결된 PR URL을 가져오기 시도 (브랜치 명시적 지정)
          PR_URL=$(gh pr view -H "${{ steps.commit.outputs.branch_name }}"" --json url --jq '.url' 2>/dev/null || echo "")
          
          if [ -z "$PR_URL" ]; then
            # 기존 PR이 없으면 새로운 PR 생성
            PR_URL=$(gh pr create -B "${{ steps.extract_branch.outputs.branch }}" -H "${{ steps.commit.outputs.branch_name }}" --title "feat: add icons synced from figma" --body "$PR_BODY" --json url --jq '.url')
          fi
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Send Slack notification for icon sync changes
        if: steps.commit.outputs.changes == 'true'
        run: |
          # JSON 페이로드 생성
          PAYLOAD=$(cat <<EOF
          {
            "text": ":appleinc2: 🎨 Figma 아이콘 동기화 PR이 생성되었습니다.",
            "attachments": [
              {
                "fields": [
                  {
                    "title": "브랜치",
                    "value": "${{ steps.commit.outputs.branch_name }}",
                    "short": true
                  },
                  {
                    "title": "PR 링크",
                    "value": "${{ steps.create_pr.outputs.pr_url }}",
                    "short": true
                  }
                ],
                "color": "good"
              }
            ]
          }
          EOF
          )
          
          # Slack에 메시지 전송
          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK_IOS_DEVS }}"
