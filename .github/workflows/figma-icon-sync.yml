name: Figma Icon Sync

on:
  workflow_dispatch:
    inputs:
      jira_issue:
        description: 'Jira 이슈 번호 (예: PI-77691)'
        required: false
        type: string

permissions:
  packages: write
  contents: write
  pull-requests: write

jobs:
  sync:
    uses: wanteddev/montage-web/.github/workflows/figma-icon-sync.yml@main
    with:
      output_dir: output
    secrets: inherit

  parse:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: output
          key: ${{ needs.sync.outputs.figma-output-cache-key }}

      - name: Node.js install
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node scripts/icon_sync.js

      - run: git config user.name "github-actions[bot]"
      - run: git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate branch name
        id: branch_name
        run: |
          # 브랜치명 생성 (Jira 이슈 번호가 있으면 사용, 없으면 run_id 사용)
          if [ -n "${{ github.event.inputs.jira_issue }}" ]; then
            BRANCH_NAME="feature/${{ github.event.inputs.jira_issue }}"
          else
            BRANCH_NAME="feature/code-connect/${{ github.run_id }}"
          fi
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Branch And Commit
        id: commit
        run: |
          git checkout -B "${{ steps.branch_name.outputs.name }}"
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: add icons synced from figma" --no-verify
            git push origin "${{ steps.branch_name.outputs.name }}"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate PR body
        id: pr_body
        run: |
          if [ -n "${{ github.event.inputs.jira_issue }}" ]; then
            echo "body=https://wantedlab.atlassian.net/browse/${{ github.event.inputs.jira_issue }}" >> $GITHUB_OUTPUT
          else
            echo "body=add icons synced from figma" >> $GITHUB_OUTPUT
          fi
    outputs:
      branch_name: ${{ steps.branch_name.outputs.name }}
      pr_body: ${{ steps.pr_body.outputs.body }}
      has_changes: ${{ steps.commit.outputs.changes }}

  generate-docs:
    needs: parse
    if: needs.parse.outputs.has_changes == 'true'
    uses: ./.github/workflows/generate-docs-pr.yml
    with:
      branch_name: ${{ needs.parse.outputs.branch_name }}
      pr_title: "feat: add icons synced from figma"
      pr_body: ${{ needs.parse.outputs.pr_body }}
    secrets:
      SLACK_WEBHOOK_IOS_DEVS: ${{ secrets.SLACK_WEBHOOK_IOS_DEVS }}
