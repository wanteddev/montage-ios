name: Generate Docs PR

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: '브랜치 이름'
        required: true
        type: string
      pr_title:
        description: 'PR 제목'
        required: false
        type: string
        default: 'docs: 문서 업데이트'
      pr_body:
        description: 'PR 본문'
        required: false
        type: string
        default: '문서를 업데이트했습니다.'
      slack_webhook:
        description: 'Slack webhook URL (선택사항)'
        required: false
        type: string
  workflow_call:
    inputs:
      branch_name:
        description: '브랜치 이름'
        required: true
        type: string
      pr_title:
        description: 'PR 제목'
        required: false
        type: string
        default: 'docs: 문서 업데이트'
      pr_body:
        description: 'PR 본문'
        required: false
        type: string
        default: '문서를 업데이트했습니다.'
      slack_webhook:
        description: 'Slack webhook URL (선택사항)'
        required: false
        type: string
    secrets:
      SLACK_WEBHOOK_IOS_DEVS:
        required: false
        description: 'Slack webhook secret'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    runs-on: self-hosted
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout existing branch or create new
        run: |
          # workflow_dispatch와 workflow_call 모두 지원
          BRANCH_NAME="${{ inputs.branch_name || github.event.inputs.branch_name }}"
          
          # 원격 브랜치 fetch
          git fetch origin "$BRANCH_NAME":refs/remotes/origin/"$BRANCH_NAME" || true
          
          # 브랜치가 원격에 존재하면 체크아웃, 없으면 새로 생성
          if git show-ref --verify --quiet refs/remotes/origin/"$BRANCH_NAME"; then
            git checkout -b "$BRANCH_NAME" origin/"$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME"
          fi
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install xcodes CLI
        run: |
          if ! command -v xcodes >/dev/null 2>&1; then
            brew install robotsandpencils/made/xcodes
          else
            echo "xcodes CLI already installed: $(xcodes --version)"
          fi

      - name: Run make to generate documentation
        working-directory: Projects/Views/Montage
        run: make

      - name: Commit changes
        id: commit
        run: |
          BRANCH_NAME="${{ env.BRANCH_NAME }}"
          COMMIT_MSG="docs: 문서 업데이트"
          
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "$COMMIT_MSG" --no-verify
            git push origin "$BRANCH_NAME"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Get base branch name
        id: base_branch
        run: |
          # 기본 브랜치 확인 (develop 또는 main)
          BASE_BRANCH=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name' || echo "develop")
          echo "branch=$BASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Create or update PR
        if: steps.commit.outputs.changes == 'true'
        id: create_pr
        run: |
          BRANCH_NAME="${{ env.BRANCH_NAME }}"
          PR_TITLE="${{ inputs.pr_title || github.event.inputs.pr_title || 'docs: 문서 업데이트' }}"
          PR_BODY="${{ inputs.pr_body || github.event.inputs.pr_body || '문서를 업데이트했습니다.' }}"
          
          # 현재 브랜치에 연결된 PR URL을 가져오기 시도
          PR_URL=$(gh pr view -H "$BRANCH_NAME" --json url --jq '.url' 2>/dev/null || echo "")
          
          if [ -z "$PR_URL" ]; then
            # 기존 PR이 없으면 새로운 PR 생성
            gh pr create \
              -B "${{ steps.base_branch.outputs.branch }}" \
              -H "$BRANCH_NAME" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
            # PR 생성 후 URL 다시 가져오기
            PR_URL=$(gh pr view -H "$BRANCH_NAME" --json url --jq '.url' 2>/dev/null || echo "")
          fi
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Send Slack notification
        if: steps.commit.outputs.changes == 'true'
        run: |
          BRANCH_NAME="${{ env.BRANCH_NAME }}"
          
          # webhook URL 결정
          if [ -n "${{ inputs.slack_webhook || github.event.inputs.slack_webhook }}" ]; then
            WEBHOOK_URL="${{ inputs.slack_webhook || github.event.inputs.slack_webhook }}"
          elif [ -n "${{ secrets.SLACK_WEBHOOK_IOS_DEVS }}" ]; then
            WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_IOS_DEVS }}"
          else
            echo "No webhook URL provided, skipping notification"
            exit 0
          fi
          PAYLOAD=$(cat <<EOF
          {
            "text": ":appleinc2: 📚 문서 업데이트 PR이 생성되었습니다.",
            "attachments": [
              {
                "fields": [
                  {
                    "title": "브랜치",
                    "value": "$BRANCH_NAME",
                    "short": true
                  },
                  {
                    "title": "PR 링크",
                    "value": "${{ steps.create_pr.outputs.pr_url }}",
                    "short": true
                  }
                ],
                "color": "good"
              }
            ]
          }
          EOF
          )
          
          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$WEBHOOK_URL"
