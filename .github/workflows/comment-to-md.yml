name: Comment to Markdown & PR

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  comment-to-md:
    runs-on: macos-latest

    env:
      GIT_USER_NAME: 'github-actions[bot]'
      GIT_USER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
      SITE_ID: 08b06d8b-5db5-42ef-934f-8026535a7fec
      NETLIFY_STATUS_URL: 'https://api.netlify.com/api/v1/badges/$SITE_ID/deploy-status'
      NETLIFY_TOKEN: nfp_oe1kDu6w4FenCiXtcUYmxW393rsFrLNQ7052

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: |
          npm install playwright turndown

      - name: Run generate_docc.sh
        run: |
          ./generate_docc.sh

      - name: Get previous Netlify deploy id
        id: prev_deploy
        run: |
          PREV_DEPLOY_ID=$(curl -s -H "Authorization: Bearer $NETLIFY_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys" | jq -r '.[0].id')
          echo "prev_deploy_id=$PREV_DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Commit and push docc submodule
        run: |
          cd docc
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"
          git checkout main || git checkout -b main
          git add .
          git commit -m "docs: update docc static site [ci skip]" || echo "No changes to commit"; exit 1
          git push origin main
          cd ..

      - name: Poll Netlify deploy status (API)
        run: |
          PREV_DEPLOY_ID="${{ steps.prev_deploy.outputs.prev_deploy_id }}"
          echo "Waiting for Netlify deploy to be triggered..."
          for i in {1..5}; do
            NEW_DEPLOY_ID=$(curl -s -H "Authorization: Bearer $NETLIFY_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys" | jq -r '.[0].id')
            if [ "$NEW_DEPLOY_ID" != "$PREV_DEPLOY_ID" ]; then
              echo "New deploy detected: $NEW_DEPLOY_ID"
              break
            fi
            echo "Waiting for new deploy to be triggered... ($i/5)"
            sleep 3
          done

          if [ "$NEW_DEPLOY_ID" = "$PREV_DEPLOY_ID" ]; then
            echo "No new deploy was triggered."
            exit 1
          fi

          for i in {1..10}; do
            STATUS=$(curl -s -H "Authorization: Bearer $NETLIFY_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys/$NEW_DEPLOY_ID" | jq -r '.state')
            echo "Current Netlify status: $STATUS ($i/10)"
            if [ "$STATUS" = "ready" ]; then
              echo "Netlify deploy succeeded!"
              exit 0
            elif [ "$STATUS" = "error" ] || [ "$STATUS" = "failed" ]; then
              echo "Netlify deploy failed!"
              exit 1
            fi
            sleep 10
          done
          echo "Netlify deploy did not succeed in time."
          exit 1

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create feature/documentation branch
        run: |
          git checkout develop
          git pull origin develop
          git checkout -b feature/documentation/${{ steps.get_tag.outputs.tag }}

      - name: Run docc_to_md.js
        run: |
          node docc_to_md.js

      - name: Commit and push markdown docs
        run: |
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"
          git add .
          git commit -m "docs: convert docc to markdown [ci skip]" || echo "No changes to commit"; exit 1
          git push origin HEAD

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          branch: feature/documentation/${{ steps.get_tag.outputs.tag }}
          title: "docs: docc to markdown for ${{ steps.get_tag.outputs.tag }}"
          body: |
            DocC → Markdown 변환 및 최신 문서 반영 PR입니다. 